<div class="calculadora">
  <h1>Calculadora de Maikel</h1>

  <!-- Inputs ordenados -->
  <input type="text" id="numero1" placeholder="Número 1">
  <input type="text" id="numero2" placeholder="Número 2">

  <!-- Botones de operaciones -->
  <div class="botones">
    <button onclick="sumar()">sumar</button>
    <button onclick="restar()">restar</button>
    <button onclick="multiplicar()">multiplicar</button>
    <button onclick="dividir()">dividir</button>
  </div>

  <p id="resultado">Resultado = </p>
</div>

<style>
  body {
    background: #f2f2f2;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 40px;
  }
  .calculadora {
    background: white;
    max-width: 350px;
    margin: auto;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
  }
  h1 {
    text-align: center;
    font-size: 30px; /* Corregido: font-size sin 'r' */
    margin-bottom: 20px;
  }
  input {
    width: 100%;
    height: 35px;
    margin-bottom: 15px;
    padding: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }
  .botones {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }
  button {
    background: black;
    color: white;
    width: 120px;
    height: 35px;
    border-radius: 155px;
    border: none;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background: #333;
  }
  #resultado {
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    margin-top: 20px;
  }
</style>

<script>
  console.log("Calculadora de Maikel inicializada correctamente.");

  function leerNumeros() {
    let numero1 = Number(document.getElementById("numero1").value);
    let numero2 = Number(document.getElementById("numero2").value);
    return {
      numero1: numero1,
      numero2: numero2
    };
  }

  function sumar() {
    let numeros = leerNumeros();
    let resultado = numeros.numero1 + numeros.numero2;
    document.getElementById("resultado").innerText = "Resultado = " + resultado;
  }

  function restar() {
    let numeros = leerNumeros();
    let resultado = numeros.numero1 - numeros.numero2;
    document.getElementById("resultado").innerText = "Resultado = " + resultado;
  }

  function multiplicar() {
    let numeros = leerNumeros();
    let resultado = numeros.numero1 * numeros.numero2;
    document.getElementById("resultado").innerText = "Resultado = " + resultado;
  }

  function dividir() {
    let numeros = leerNumeros();
    // Validación DevOps: Evitar colapsar la aplicación al dividir por cero
    if (numeros.numero2 === 0) {
      document.getElementById("resultado").innerText = "Error: No se puede dividir por 0";
      return;
    }
    let resultado = numeros.numero1 / numeros.numero2;
    document.getElementById("resultado").innerText = "Resultado = " + resultado;
  }
  
</script>
